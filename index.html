<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMU Seed Library</title>
  <style>
    :root{
      --bg:#f3f8f4;
      --bg-2:#eef5f0;
      --card:#ffffff;
      --line:#cfe0d5;
      --text:#1d342b;
      --muted:#60766c;
      --brand:#256f52;
      --brand-2:#2f8a67;
      --brand-3:#e2f1e8;
      --soft:#f8fcf9;
      --warn:#b53a3a;
      --amber:#8a6a1a;
      --shadow:0 16px 36px rgba(22,49,38,.08);
      --radius:22px;
      --max:1260px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, #e6f7ed 0%, transparent 28%),
        radial-gradient(circle at bottom left, #edf8f0 0%, transparent 24%),
        var(--bg);
    }

    img{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}
    button,input,select,textarea{font:inherit}

    .wrap{width:min(var(--max),calc(100% - 28px));margin:0 auto}

    header{
      position:sticky;top:0;z-index:50;
      background:rgba(243,248,244,.92);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
    }
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:12px 0;
    }
    .brand{
      display:flex;align-items:center;gap:12px;cursor:pointer;min-width:0;
      flex:0 0 auto;
    }
    .brand-mark{
      width:44px;height:44px;border-radius:16px;
      display:grid;place-items:center;
      background:linear-gradient(180deg,var(--brand),var(--brand-2));
      color:#fff;font-size:22px;font-weight:900;box-shadow:var(--shadow);
      flex:0 0 auto;
    }
    .brand-title{font-size:17px;font-weight:900;line-height:1.05}
    .brand-sub{
      font-size:11px;color:var(--muted);margin-top:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px
    }

    nav{
      display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow:auto;
      scrollbar-width:none;min-width:0
    }
    nav::-webkit-scrollbar{display:none}
    .nav-btn{
      appearance:none;border:1px solid transparent;background:transparent;color:var(--text);
      border-radius:10px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer;
      white-space:nowrap;flex:0 0 auto;
    }
    .nav-btn:hover,.nav-btn.active{
      background:#fff;border-color:var(--line);box-shadow:0 8px 18px rgba(22,49,38,.05);
    }

    main{padding:22px 0 64px}
    .page{display:none}
    .page.active{display:block}

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
    }

    h1,h2,h3,h4{margin:0 0 10px;line-height:1.12}
    h1{font-size:40px;letter-spacing:-.03em;margin-top:14px}
    h2{font-size:24px;letter-spacing:-.02em}
    h3{font-size:18px;letter-spacing:-.01em}
    p{margin:8px 0;color:var(--muted);line-height:1.55}

    .eyebrow{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--line);border-radius:999px;background:#fff;
      padding:8px 12px;font-size:12px;font-weight:900;text-transform:uppercase;color:var(--brand);
    }
    .eyebrow-dot{
      width:8px;height:8px;border-radius:50%;background:var(--brand-2);
      box-shadow:0 0 0 6px rgba(47,138,103,.12)
    }

    .hero{
      display:grid;grid-template-columns:1.18fr .82fr;gap:18px;align-items:stretch;
    }
    .hero-main{
      padding:32px;
      background:
        radial-gradient(circle at top right, #dff3e8 0, transparent 30%),
        linear-gradient(180deg,#ffffff 0%,#f8fcf9 100%);
    }

    .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    .btn{
      appearance:none;border:none;cursor:pointer;
      border-radius:16px;padding:13px 18px;font-weight:900;
      background:linear-gradient(180deg,var(--brand),var(--brand-2));color:#fff;
      box-shadow:0 12px 20px rgba(31,107,79,.22);
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{
      background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;
    }
    .btn.ghost{
      background:transparent;color:var(--brand);border:1px dashed var(--line);box-shadow:none;
    }
    .btn.lg{padding:18px 24px;font-size:17px;border-radius:18px}

    .steps{display:grid;gap:12px}
    .step{
      display:grid;grid-template-columns:42px 1fr;gap:12px;align-items:start;
      border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;
    }
    .step-num{
      width:42px;height:42px;border-radius:14px;background:var(--brand-3);
      display:grid;place-items:center;color:var(--brand);font-size:18px;font-weight:900;
    }

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
    .stat-num{font-size:28px;font-weight:900;line-height:1;color:var(--brand)}
    .stat-label{font-size:12px;color:var(--muted);margin-top:6px}

    .section-head{
      display:flex;align-items:end;justify-content:space-between;gap:12px;margin:28px 0 14px;
    }
    .section-head p{margin:0}

    .pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .pill,.badge,.chip{
      display:inline-flex;align-items:center;gap:8px;
      border-radius:999px;padding:8px 12px;background:#fff;border:1px solid var(--line);
      font-size:12px;color:var(--muted);font-weight:800;
    }

    .catalog-layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
    .filter-stack{display:grid;gap:14px;position:sticky;top:86px}
    .filter-shell{
      background:#f7faf8;border:1px solid var(--line);border-radius:26px;padding:20px;
    }
    .filter-shell h3{font-size:16px;margin-bottom:4px}
    .filter-shell p{font-size:13px;margin:0 0 14px}
    .filter-box{
      background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin-top:16px;
    }
    .filter-title{font-size:12px;font-weight:900;color:var(--text);margin-bottom:10px}
    .search-shell{
      border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px 14px;
    }
    .search-shell input{
      width:100%;border:none;outline:none;background:transparent;padding:0;font-size:14px;color:var(--text);
    }
    .search-shell input::placeholder{color:#98a7a0;font-weight:700}
    .seg-row{display:flex;gap:10px;flex-wrap:wrap}
    .seg{
      appearance:none;border:1px solid var(--line);background:#fff;color:var(--muted);
      border-radius:999px;padding:9px 14px;font-size:12px;font-weight:900;cursor:pointer;
    }
    .seg.active{background:var(--brand);color:#fff;border-color:transparent}

    .seed-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
      align-items:stretch;
    }
    .seed-card{
      overflow:hidden;
      padding:0;
      display:flex;
      flex-direction:column;
      height:100%;
    }
    .seed-media{
      position:relative;
      aspect-ratio:1.45 / 1;
      background:linear-gradient(135deg,#eef7f1 0%,#dceee2 100%);
      border-bottom:1px solid var(--line);
      overflow:hidden;
      flex:0 0 auto;
    }
    .seed-photo{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .seed-media::after{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(0,0,0,.04) 0%, rgba(0,0,0,.24) 100%);
      pointer-events:none;
    }
    .seed-media-top{
      position:absolute;top:14px;left:14px;right:14px;z-index:2;
      display:flex;justify-content:space-between;align-items:start;gap:10px;
    }
    .seed-visual-tag{
      padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.65);
      font-size:11px;font-weight:900;color:var(--brand);
      backdrop-filter:blur(6px);
    }
    .seed-visual-mark{
      width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.88);
      display:grid;place-items:center;font-size:22px;backdrop-filter:blur(6px);
    }
    .seed-media-bottom{
      position:absolute;left:16px;right:16px;bottom:14px;z-index:2;color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,.35);
    }
    .seed-media-bottom h4{margin:0;font-size:22px;letter-spacing:-.02em}
    .seed-media-bottom p{margin:6px 0 0;color:rgba(255,255,255,.92);font-size:12px;line-height:1.45}

    .seed-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      flex:1 1 auto;
    }
    .seed-head{display:flex;align-items:start;justify-content:space-between;gap:10px}
    .seed-badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
    .badge{padding:6px 10px;font-size:11px}
    .price{font-size:19px;font-weight:900;color:var(--brand)}
    .tiny{font-size:12px;color:var(--muted);line-height:1.5}
    .tiny.warn{color:var(--warn);font-weight:900}
    .tiny.amber{color:var(--amber);font-weight:900}
    .hint-block{padding:16px;border-radius:18px;background:#fbfefc;border:1px dashed var(--line)}

    .list{display:grid;gap:10px;list-style:none;padding:0;margin:12px 0 0}
    .list li{display:grid;grid-template-columns:22px 1fr;gap:10px;align-items:start}
    .list i{
      width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
      background:var(--brand-3);color:var(--brand);font-style:normal;font-size:12px;font-weight:900;
    }

    .seed-actions{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      margin-top:auto;padding-top:16px;
    }
    .qty-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .qty-control{
      display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:4px;background:#fff;
    }
    .qty-btn{
      width:32px;height:32px;border:none;border-radius:50%;background:#edf7f1;
      color:var(--brand);font-size:18px;font-weight:900;cursor:pointer;
    }
    .qty-input{
      width:52px;text-align:center;border:none;background:transparent;padding:0;font-weight:900;color:var(--text);outline:none;
    }

    .quiz-shell{padding:4px 0 0}
    .quiz-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:22px;align-items:start}
    .quiz-main,.quiz-result-card{
      background:rgba(255,255,255,.76);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:24px;
    }
    .quiz-progress{height:16px;border-radius:999px;background:#dfe9e4;border:1px solid #c8ddd0;overflow:hidden;margin-bottom:22px}
    .quiz-progress-bar{height:100%;width:0;background:linear-gradient(180deg,var(--brand),var(--brand-2));transition:width .22s ease}
    .quiz-qtag{
      display:inline-flex;width:100%;align-items:center;border:1px solid #c8ddd0;border-radius:999px;
      padding:12px 16px;font-size:13px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);
      background:rgba(255,255,255,.72);
    }
    .quiz-question{font-size:28px;line-height:1.16;margin:18px 0 16px;letter-spacing:-.02em}
    .quiz-question.emph{font-weight:1000}
    .quiz-options{display:grid;gap:14px;margin-top:8px}
    .quiz-option{
      appearance:none;width:100%;text-align:left;border:1px solid #c8ddd0;background:rgba(255,255,255,.82);
      color:var(--text);border-radius:22px;padding:18px;font-size:17px;font-weight:800;cursor:pointer;transition:.18s ease;
    }
    .quiz-option:hover{border-color:rgba(31,107,79,.45);transform:translateY(-1px);box-shadow:0 10px 20px rgba(22,49,38,.05)}
    .quiz-side{display:grid;gap:18px}
    .quiz-side .card{background:rgba(255,255,255,.72)}

    .result-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
    .result-badge,.result-fit{
      display:inline-flex;align-items:center;border:1px solid #c8ddd0;border-radius:999px;background:rgba(255,255,255,.8);
      font-weight:900;color:var(--brand);
    }
    .result-badge{padding:10px 16px;font-size:12px;letter-spacing:.04em;text-transform:uppercase}
    .result-fit{padding:12px 18px;color:var(--muted);min-width:320px;max-width:100%}
    .result-seeds{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:12px}
    .result-seed{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.75);padding:18px}
    .result-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .cart-list,.feed{display:grid;gap:12px}
    .cart-item{
      display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
      border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;
    }
    .cart-name{font-weight:900;font-size:16px}
    .cart-meta{font-size:12px;color:var(--muted);margin-top:6px}
    .cart-right{text-align:right;display:grid;gap:10px;justify-items:end}
    .sum-row{display:flex;justify-content:space-between;gap:12px;margin:8px 0;font-size:14px}
    .sum-row.total{
      margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-weight:900;font-size:17px;color:var(--text);
    }
    .sum-row.deposit span:first-child{color:var(--brand)}
    .sum-row.fee span:first-child{color:var(--amber)}
    .sum-box{
      padding:14px 16px;border-radius:18px;background:#f8fcf9;border:1px solid var(--line);margin-top:14px;
    }

    .checkout-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:18px;align-items:start}
    .pay-card{
      background:radial-gradient(circle at top right,#e7f7ee 0,transparent 34%),linear-gradient(180deg,#fff 0%,#f8fcf9 100%);
    }
    .qr{
      margin:14px auto 0;width:300px;max-width:100%;background:#fff;border:1px solid var(--line);
      border-radius:18px;padding:16px;box-shadow:var(--shadow);
    }
    .qr img{width:100%;height:auto;border-radius:10px}
    .qr-fallback{
      width:100%;aspect-ratio:1/1;border-radius:12px;border:1px dashed var(--line);
      background:linear-gradient(135deg,#f8fbf9,#eef6f1);
      display:grid;place-items:center;padding:20px;text-align:center;
    }
    .form-frame{
      width:100%;height:1109px;border:1px solid var(--line);border-radius:18px;background:#fff;margin-top:14px;
    }

    .community-layout{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
    .community-sidebar{display:grid;gap:16px;position:sticky;top:86px}
    .post{
      background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 18px rgba(22,49,38,.04);
    }
    .post-head{display:flex;justify-content:space-between;gap:10px;align-items:start}
    .post-user{font-weight:900}
    .post-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .post-actions{display:flex;gap:16px;align-items:center;margin-top:12px;color:var(--muted);font-size:13px;font-weight:700}
    .post-img{
      margin-top:12px;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#eff8f2;
    }
    .post-img img{width:100%;max-height:360px;object-fit:cover}
    .post-tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:8px}
    .post-tools button{
      border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:7px 11px;cursor:pointer;font-size:12px;font-weight:800;
    }
    .comment-box{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
    .comment-list{display:grid;gap:8px;margin-top:12px}
    .comment{
      background:#f9fcfa;border:1px solid var(--line);border-radius:14px;padding:10px 12px;
    }
    .comment-author{font-size:12px;font-weight:900;color:var(--text)}
    .comment-text{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}

    .event-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .event-card{
      display:flex;flex-direction:column;gap:14px;
      background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow);
    }
    .event-date{
      width:84px;border-radius:18px;background:var(--brand-3);padding:12px 10px;text-align:center;
      color:var(--brand);
    }
    .event-date .day{font-size:26px;font-weight:1000;line-height:1}
    .event-date .month{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
    .event-head{display:flex;align-items:start;justify-content:space-between;gap:12px}
    .event-meta{display:grid;gap:8px}
    .event-chip{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;
      font-size:12px;font-weight:800;color:var(--muted);
    }

    .empty{
      border:1px dashed var(--line);border-radius:18px;padding:22px;text-align:center;color:var(--muted);background:#fbfefc;
    }
    .note{
      font-size:13px;color:var(--muted);padding:12px 14px;border-radius:16px;background:#fbfefc;border:1px dashed var(--line);
    }
    .tabbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .tab{
      border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-size:12px;font-weight:900;color:var(--muted);cursor:pointer;
    }
    .tab.active{background:var(--brand);color:#fff;border-color:transparent}
    .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
    .gallery-item{border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#fff;box-shadow:0 8px 18px rgba(22,49,38,.04)}
    .gallery-visual{aspect-ratio:1.2 / 1;display:grid;place-items:center;font-size:52px;background:linear-gradient(135deg,#dff3e8,#edf9f0)}
    .gallery-copy{padding:14px;font-size:13px}
    .applied-note{
      margin:0 0 16px;border:1px solid var(--line);background:#f7fbf8;border-radius:18px;padding:14px 16px;
    }

    .map-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
    .map-card{overflow:hidden;padding:0}
    .map-copy{padding:18px}
    .map-frame{
      width:100%;height:280px;border:0;border-top:1px solid var(--line);
    }

    .oos-card{opacity:0.72;filter:grayscale(0.3);}
    .oos-overlay{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      background:rgba(15,28,22,.72);color:#fff;
      font-size:13px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;
      border-radius:999px;padding:8px 16px;pointer-events:none;white-space:nowrap;
    }
    .oos-badge{
      background:#fdf0f0;border-color:#f0c8c8;color:var(--warn);font-weight:900;
    }

    .foot{margin-top:36px;color:var(--muted);font-size:12px;text-align:center}

    .modal{
      position:fixed;
      inset:0;
      background:rgba(15,28,22,.48);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:200;
    }
    .modal.open{display:flex}
    .modal-card{
      width:min(760px,100%);
      max-height:min(88vh,900px);
      overflow:auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 30px 80px rgba(0,0,0,.22);
      padding:24px;
      position:relative;
    }
    .modal-close{
      position:absolute;
      top:16px;
      right:16px;
      width:40px;
      height:40px;
      border:none;
      border-radius:50%;
      background:#edf7f1;
      color:var(--brand);
      font-size:22px;
      font-weight:900;
      cursor:pointer;
    }
    .modal-section{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid var(--line);
    }
    .modal-section:first-of-type{
      margin-top:14px;
      padding-top:0;
      border-top:none;
    }

    /* ── Hamburger menu (mobile only) ─────────────────────────── */
    .hamburger{
      display:none;
      flex-direction:column;justify-content:center;align-items:center;gap:5px;
      width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
      background:#fff;cursor:pointer;flex:0 0 auto;
    }
    .hamburger span{
      display:block;width:18px;height:2px;border-radius:2px;
      background:var(--text);transition:.2s ease;
    }
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}

    <!-- ═══════════════════════════════════════════════════════════════════════
         GOOGLE SHEETS SETUP INSTRUCTIONS
         Read this once, follow the steps, and your inventory will be live.
    ════════════════════════════════════════════════════════════════════════════

    STEP 1 — Create your Google Sheet
    ───────────────────────────────────────────────────────────────────────────
    Go to sheets.google.com and create a new spreadsheet.
    Name it something like "SMU Seed Library Inventory".

    STEP 2 — Set up the columns (Row 1 = headers, exactly as shown below)
    ───────────────────────────────────────────────────────────────────────────
    Copy and paste these exact column names into Row 1 of your sheet:

      ID | Name | Icon | Level | Category | Tags | Sunlight | Water | Space |
      Stock | Price | SeedsPerPack | Summary | ImageURL | Status |
      CareSeedCare | CarePlanting | CarePlantCare | CareSaving

    Column explanations:
    • ID          — A short unique ID with no spaces, e.g. butterfly-pea
                    (if you leave this blank, it is auto-generated from the Name)
    • Name        — Full seed name, e.g. Butterfly Pea Flower
    • Icon        — An emoji, e.g. 🪻
    • Level       — One of: Beginner, Slightly advanced, Intermediate, Advanced
    • Category    — One of: Flower, Edible, Fruit (or any new category you like)
    • Tags        — Comma-separated tags, e.g. beauty,pollinators,tea,starter
    • Sunlight    — Free text, e.g. Full sun to partial sun
    • Water       — Free text, e.g. Water when top soil starts to dry
    • Space       — Free text, e.g. Medium pot or planter
    • Stock       — A whole number, e.g. 12 (set to 0 for out of stock)
    • Price       — A number, e.g. 1.50
    • SeedsPerPack — A whole number, e.g. 12
    • Summary     — One sentence describing the seed
    • ImageURL    — A public image link. Options:
                    a) Upload photo to Google Drive → right-click → Share →
                       Anyone with link → Copy link → paste here
                    b) Any public image URL from the web
                    c) Leave blank for no photo
    • Status      — Type "active" to show the seed, "inactive" to hide it
    • CareSeedCare — Care instructions separated by the | character
                     e.g. Soak seeds overnight.|Keep medium lightly moist.
    • CarePlanting — Same format, for planting instructions
    • CarePlantCare — Same format, for ongoing plant care
    • CareSaving   — Same format, for seed saving instructions

    STEP 3 — Add your seed data
    ───────────────────────────────────────────────────────────────────────────
    Fill in one row per seed type. You can copy the existing seeds from the
    built-in data as a starting point if you like.

    To UPDATE stock: just change the number in the Stock column.
    To ADD a new seed: add a new row with all columns filled.
    To DECOMMISSION a seed: change its Status column from "active" to "inactive".
    To BRING IT BACK: change Status back to "active".

    STEP 4 — Publish the sheet as CSV
    ───────────────────────────────────────────────────────────────────────────
    a) In Google Sheets, click the menu: File → Share → Publish to web
    b) In the first dropdown, make sure it says "Sheet1" (or your sheet name)
    c) In the second dropdown, change it from "Web page" to "Comma-separated values (.csv)"
    d) Click "Publish"
    e) Click OK when it asks you to confirm
    f) A URL will appear. It looks like:
       https://docs.google.com/spreadsheets/d/e/LONG_ID_HERE/pub?gid=0&single=true&output=csv
    g) Copy that entire URL.

    STEP 5 — Paste the URL into this file
    ───────────────────────────────────────────────────────────────────────────
    Open this HTML file in a text editor (e.g. Notepad, VS Code).
    Find this line near the top of the <script> section:

      const SHEET_CSV_URL = "YOUR_GOOGLE_SHEET_CSV_URL_HERE";

    Replace YOUR_GOOGLE_SHEET_CSV_URL_HERE with the URL you copied.
    Save the file. Done!

    STEP 6 — Test it
    ───────────────────────────────────────────────────────────────────────────
    Open the HTML file in your browser and go to "Browse seeds".
    You should see your seeds loading from the sheet within a second or two.
    If something goes wrong, the site will fall back to the built-in data and
    show a yellow warning message at the top of the catalogue page.

    COMMON ISSUES:
    • If you see "Could not reach Google Sheets" — double-check you published as
      CSV (not as a web page) and that the URL is pasted correctly.
    • If seeds are missing — check the Status column says "active" exactly.
    • If care info is missing — make sure your care columns use | to separate
      each instruction (not commas or line breaks).

    ══════════════════════════════════════════════════════════════════════════ -->

    // Parses a CSV line, handling quoted fields that may contain commas
    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          inQuotes = !inQuotes;
        } else if (ch === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += ch;
        }
      }
      result.push(current.trim());
      return result;
    }

    // Splits a pipe-separated care field into an array of strings
    function parsePipeList(str) {
      if (!str) return [];
      return str.split("|").map(s => s.trim()).filter(Boolean);
    }

    // Converts a row of CSV values (with headers) into a seed object
    function rowToSeed(headers, values) {

        SEEDS = FALLBACK_SEEDS;
        return { ok: true, source: "fallback" };

      // approaches: first a CORS proxy, then the raw URL as a fallback.
      const CORS_PROXY = "https://corsproxy.io/?";
      const urlsToTry = [CORS_PROXY + encodeURIComponent(SHEET_CSV_URL), SHEET_CSV_URL];
      let lastErr = "";
      for (const url of urlsToTry) {
        try {
          const res = await fetch(url);
          if (!res.ok) { lastErr = "HTTP " + res.status; continue; }
          const text = await res.text();
          const lines = text.split("\n").filter(l => l.trim());
          if (lines.length < 2) { lastErr = "Sheet appears empty"; continue; }
          const headers = parseCSVLine(lines[0]);
          const seeds = [];
          for (let i = 1; i < lines.length; i++) {
            const values = parseCSVLine(lines[i]);
            if (values.every(v => !v)) continue;
            const seed = rowToSeed(headers, values);
            if (seed.name && seed.status === "active") seeds.push(seed);
          }
          SEEDS = seeds;
          return { ok: true, source: "sheet", count: seeds.length };

      SEEDS = FALLBACK_SEEDS;

    function esc(str=""){
      return String(str)

        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }
    function formatDate(value){
      const d = new Date(value);
      if(Number.isNaN(d.getTime())) return value;
      return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
    }
    function formatMonthShort(value){
      const d = new Date(value);
      if(Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString(undefined,{month:"short"});
    }
    function formatDay(value){
      const d = new Date(value);

      setQty(seedId, value){
        let qty = parseInt(value,10);
        if(Number.isNaN(qty)) qty = 0;
        qty = Math.max(0, qty);
        const seed = this.seedById(seedId);
        if(!seed) return;
        const otherQty = this.state.cart.filter(i => i.seedId !== seedId).reduce((sum,i)=>sum+i.qty,0);
        const maxAllowed = Math.max(0, 5 - otherQty);
        qty = Math.min(qty, maxAllowed, seed.stock);
        const existing = this.state.cart.find(i => i.seedId === seedId);
        if(existing){
          existing.qty = qty;
          if(existing.qty <= 0) this.state.cart = this.state.cart.filter(i => i.seedId !== seedId);
        }else if(qty > 0){
          this.state.cart.push({seedId, qty});
        }
        save("seedCart", this.state.cart);
        this.renderSeeds();
        this.renderCart();
        this.renderCheckout();
      },

      adjustQty(seedId, delta){
        const current = this.state.cart.find(i => i.seedId === seedId)?.qty || 0;
        this.setQty(seedId, current + delta);
      },

      removeFromCart(seedId){
        this.state.cart = this.state.cart.filter(i => i.seedId !== seedId);
        save("seedCart", this.state.cart);
        this.renderSeeds();
        this.renderCart();
        this.renderCheckout();
      },

      quizAnswer(index){
        const current = this.state.quiz.step;
        this.state.quiz.answers[current] = index;
        if(current < QUIZ.questions.length - 1){
          this.state.quiz.step += 1;
        }else{
          this.finishQuiz();
        }
        this.renderFinder();
      },

      finishQuiz(){
        const totals = {dedicated:0, steady:0, explorer:0, casual:0, easy:0};
        this.state.quiz.answers.forEach((answerIndex, qIndex) => {
          const answer = QUIZ.questions[qIndex]?.answers[answerIndex];
          if(!answer) return;
          Object.entries(answer.scores).forEach(([k,v]) => totals[k] += v);
        });
        this.state.quiz.result = Object.entries(totals).sort((a,b) => b[1] - a[1])[0]?.[0] || "easy";
      },

      retakeQuiz(){
        this.state.quiz = {step:0, answers:[], result:null};
        this.renderFinder();
      },

      applyQuizResult(){
        const key = this.state.quiz.result;
        if(!key) return;
        const profile = QUIZ.profiles[key];
        if(!profile) return;
        this.state.filter = {...this.state.filter, ...profile.filter};
        this.state.appliedProfile = key;
        save("seedFilter", this.state.filter);
        save("seedAppliedProfile", this.state.appliedProfile);
        this.navigate("seeds");
      },

            userId:this.state.user.id,
            tag:"Community note",
            time:"Just now",
            seedId,
            title,
            text,
            likes:0,
            image:imageData,
            comments:[]
          };
          this.state.posts.unshift(post);
          save("seedPosts", this.state.posts);
          this.renderCommunity();
        };

        const file = photoInput?.files?.[0];
        if(file){
          const reader = new FileReader();
          reader.onload = () => finalise(reader.result || "");
          reader.readAsDataURL(file);
        }else{
          finalise("");
        }
      },

      deletePost(postId){
        this.state.posts = this.state.posts.filter(post => !(post.id === postId && post.userId === this.state.user.id));
        save("seedPosts", this.state.posts);
        this.renderCommunity();
      },

      addComment(postId){
        const input = document.getElementById("comment-" + postId);
        if(!input) return;
        const text = input.value.trim();
        if(!text) return;
        const post = this.state.posts.find(p => p.id === postId);
        if(!post) return;
        post.comments = post.comments || [];
        post.comments.push({
          id:"comment-" + Math.random().toString(36).slice(2,9),
          user:this.state.user.username || this.state.user.name || "Community grower",
          text
        });
        save("seedPosts", this.state.posts);
        this.renderCommunity();
      },

        const seedType = document.getElementById("returnSeedType").value.trim();
        const qty = document.getElementById("returnQty").value.trim();
        const notes = document.getElementById("returnNotes").value.trim();

        this.state.returns.unshift({
          id:"RET-" + Math.random().toString(36).slice(2,8).toUpperCase(),
          createdAt:new Date().toISOString(),
          name, seedType, qty, notes, status:"Received"
        });
        save("seedReturns", this.state.returns);
        this.renderReturns();
        alert("Your seed return has been submitted.");

                <div class="qr">
                  ${PAYNOW_QR ? `
                    <img src="${PAYNOW_QR}" alt="PayNow QR code" onerror="this.style.display='none';this.nextElementSibling.style.display='grid';">
                    <div class="qr-fallback" style="display:none;">
                      <div>
                        <strong>Payment QR unavailable</strong>
                        <div class="tiny" style="margin-top:8px;">Please check the QR image path.</div>
                      </div>
                    </div>
                  ` : `
                    <div class="qr-fallback">
                      <div>
                        <strong>Payment QR unavailable</strong>
                        <div class="tiny" style="margin-top:8px;">Add your PayNow QR image to make this section live.</div>
                      </div>
                    </div>
                  `}
                </div>

                <div class="pill-row">
                  <div class="pill">Upfront total: $${total.toFixed(2)}</div>
                  <div class="pill">Total packs: ${this.totalPacks()}</div>
                </div>

                <div style="height:1px;background:var(--line);margin:16px 0;"></div>

                <h3>Payment breakdown</h3>
                ${items.map(item => `<div class="sum-row"><span>${item.seed.name} × ${item.qty}</span><strong>$${(item.seed.price * item.qty).toFixed(2)}</strong></div>`).join("")}
                <div class="sum-row deposit"><span>Refundable seed deposit</span><strong>$${deposit.toFixed(2)}</strong></div>
                <div class="sum-row fee"><span>Admin handling</span><strong>$${service.toFixed(2)}</strong></div>
                <div class="sum-row total"><span>Upfront total due now</span><span>$${total.toFixed(2)}</span></div>

                <div class="sum-box">
                  <div class="tiny" style="font-weight:900;color:var(--text);margin-bottom:6px;">Refund note</div>
                  <div class="tiny">
                    The seed deposit can be refunded after a successful return. Admin handling is not refundable.
                  </div>
                </div>

                <div style="height:1px;background:var(--line);margin:16px 0;"></div>
                <div class="tiny"><strong>Order preview:</strong> ${esc(this.buildOrderSummary() || "No items")}</div>
                <div class="tiny" style="margin-top:8px;">You will enter your contact details in the form.</div>
              </div>
            </div>
          ` : `
            <div class="empty">
              There is nothing to check out because your cart is empty.
              <div style="margin-top:10px;">
                <button class="btn secondary" onclick="app.navigate('seeds')">Browse seeds</button>
              </div>
            </div>
          `}
        `;
      },

      renderCommunity(){
        const posts = [...this.state.posts];
        document.getElementById("page-community").innerHTML = `
          <div class="section-head">
            <div>
              <h2>Community feed</h2>
              <p>Share what worked, what failed, and what others should know before planting.</p>
            </div>
          </div>

          <div class="community-layout">
            <div class="community-sidebar">
              <div class="card">
                <h3>Make a post</h3>
                <div style="margin-top:10px;">
                  <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Post title</label>
                  <input type="text" id="postTitle" placeholder="Example: Nai Bai grew well in morning sun" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
                </div>
                <div style="margin-top:12px;">
                  <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Seed type</label>
                  <select id="postSeed" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
                    ${SEEDS.map(seed => `<option value="${seed.id}">${seed.name}</option>`).join("")}
                  </select>
                </div>
                <div style="margin-top:12px;">
                  <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Your note</label>
                  <textarea id="postText" rows="5" placeholder="What happened, what worked, and what others should watch for" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;"></textarea>
                </div>
                <div style="margin-top:12px;">
                  <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Optional photo</label>
                  <input id="postPhoto" type="file" accept="image/*" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff;">
                </div>
                <div class="cta-row">
                  <button class="btn" onclick="app.createPost()">Publish post</button>
                </div>
              </div>

              <div class="card">
                <h3>What makes a useful post</h3>
                <ul class="list">
                  <li><i>1</i><div>Describe your growing setup, not only the result.</div></li>
                  <li><i>2</i><div>State whether the plant was in full sun, partial sun, pot, tray, or ground.</div></li>
                  <li><i>3</i><div>Share mistakes too. Failure data is often more useful than success data.</div></li>
                  <li><i>4</i><div>Include practical seed-saving notes when relevant.</div></li>
                </ul>
              </div>
            </div>

            <div>
              <div class="section-head" style="margin-top:0;">
                <div>
                  <h2>Latest posts</h2>
                  <p>${posts.length} post${posts.length===1 ? "" : "s"} shown</p>
                </div>
              </div>

              <div class="feed">
                ${posts.map(post => {
                  const own = post.userId === this.state.user.id;
                  const comments = post.comments || [];
                  return `
                    <div class="post">
                      <div class="post-head">
                        <div>
                          <div class="post-user">${esc(post.user)}</div>
                          <div class="post-meta">${esc(post.tag)} · ${esc(post.time)}</div>
                        </div>
                        <div class="pill">${esc(post.title)}</div>
                      </div>

                      <p>${esc(post.text)}</p>

                      ${post.image ? `
                        <div class="post-img"><img src="${post.image}" alt="${esc(post.title)}"></div>
                      ` : ``}

                      <div class="post-actions">
                        <span>❤ ${post.likes}</span>
                        <span>💬 ${comments.length}</span>
                      </div>

                      ${own ? `<div class="post-tools"><button onclick="app.deletePost('${post.id}')">Delete my post</button></div>` : ""}

                      <div class="comment-box">
                        <div class="tiny" style="font-weight:900;color:var(--text);">Comments</div>
                        <div class="comment-list">
                          ${comments.length ? comments.map(comment => `
                            <div class="comment">
                              <div class="comment-author">${esc(comment.user)}</div>
                              <div class="comment-text">${esc(comment.text)}</div>
                            </div>
                          `).join("") : `<div class="tiny">No comments yet.</div>`}
                        </div>

                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
                          <input id="comment-${post.id}" type="text" placeholder="Add a comment" style="flex:1 1 240px;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
                          <button class="btn secondary" onclick="app.addComment('${post.id}')">Post comment</button>
                        </div>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          </div>
        `;
      },

      renderEvents(){
        document.getElementById("page-events").innerHTML = `
          <div class="section-head">
            <div>
              <h2>Community events</h2>
              <p>Events at SMU for seed exchange, cuttings swaps, and community building.</p>
            </div>
          </div>

          <div class="event-grid">
            ${EVENTS.map(event => `
              <div class="event-card">
                <div class="event-head">
                  <div class="event-date">
                    <div class="day">${formatDay(event.date)}</div>
                    <div class="month">${formatMonthShort(event.date)}</div>
                  </div>
                  <div class="event-chip">${esc(event.type)}</div>
                </div>

                <div>
                  <h3>${esc(event.title)}</h3>
                  <p>${esc(event.summary)}</p>
                </div>

                <div class="event-meta">
                  <div class="pill">${formatDate(event.date)}</div>
                  <div class="pill">${esc(event.time)}</div>
                  <div class="pill">${esc(event.venue)}</div>
                </div>

                <ul class="list">
                  ${event.notes.map(note => `<li><i>•</i><div>${esc(note)}</div></li>`).join("")}
                </ul>
              </div>
            `).join("")}
          </div>

          <div class="section-head">
            <div>
              <h2>Why this page exists</h2>
              <p>Some plants are best shared through cuttings, and some growers want to exchange seeds directly. The point is to build a real growing community, not just a pickup flow.</p>
            </div>
          </div>

          <div class="card">
            <ul class="list">
              <li><i>1</i><div>Cuttings exchange for plants propagated by cuttings.</div></li>
              <li><i>2</i><div>Seed swap sessions for home-saved seeds and extra seed packets.</div></li>
              <li><i>3</i><div>Beginner-friendly events to help people meet, ask questions, and keep growing.</div></li>
            </ul>
          </div>
        `;
      },

      renderReturns(){
        const items = this.state.returns;
        document.getElementById("page-returns").innerHTML = `
          <div class="section-head">
            <div>
              <h2>Seed returns</h2>
              <p>Tell us what you are returning before you drop it off at the collection point.</p>
            </div>
          </div>

          <div class="two-col">
            <div class="card">
              <h3>Submit a return</h3>
              <div style="margin-top:10px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Name</label>
                <input id="returnName" type="text" placeholder="Your name" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div style="margin-top:12px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Seed type</label>
                <input id="returnSeedType" type="text" placeholder="Example: Butterfly Pea Flower" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div style="margin-top:12px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Approximate quantity</label>
                <input id="returnQty" type="text" placeholder="Example: 20 seeds" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div style="margin-top:12px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Useful growing notes</label>
                <textarea id="returnNotes" rows="5" placeholder="Drying method, harvest date, pest issues, or germination notes" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;"></textarea>
              </div>
              <div class="cta-row">
                <button class="btn" onclick="app.submitReturn()">Submit return</button>
              </div>
              <div class="note" style="margin-top:14px;">
                Pack seeds dry, label them clearly, and include any notes that would help the next grower.
              </div>
            </div>

            <div class="card">
              <h3>Return rules</h3>
              <ul class="list">
                <li><i>1</i><div>Return only clean, dry, identifiable seeds.</div></li>
                <li><i>2</i><div>Do not return mouldy, damp, or mixed seed batches.</div></li>
                <li><i>3</i><div>Label the seed type clearly and include the date where possible.</div></li>
                <li><i>4</i><div>Use paper packets rather than sealed plastic if the seeds may still hold moisture.</div></li>
                <li><i>5</i><div>Useful growing notes help the next person start better.</div></li>
              </ul>
            </div>
          </div>

          <div class="section-head">
            <div>
              <h2>Recent returns</h2>
              <p>${items.length} return${items.length===1 ? "" : "s"} saved in this browser</p>
            </div>
          </div>

          ${items.length ? `
            <div class="card">
              <div class="cart-list">
                ${items.map(item => `
                  <div class="cart-item">
                    <div>
                      <div class="cart-name">${esc(item.seedType)}</div>
                      <div class="cart-meta">${esc(item.name)} · ${formatDate(item.createdAt)} · ${esc(item.qty)}</div>
                      <div class="tiny" style="margin-top:8px;">${esc(item.notes || "No extra notes.")}</div>
                    </div>
                    <div class="cart-right">
                      <div class="pill">${esc(item.status)}</div>
                      <div class="tiny">${esc(item.id)}</div>
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
          ` : `
            <div class="empty">No returns yet.</div>
          `}
        `;
      },

      renderLearn(){
        const tab = this.state.learnTab;
        document.getElementById("page-learn").innerHTML = `
          <div class="section-head">
            <div>
              <h2>Learn</h2>
              <p>Core guidance for seed care, harvesting, storing, and returning seeds into the system.</p>
            </div>
          </div>

          <div class="tabbar">
            <button class="tab ${tab==="seed-saving" ? "active" : ""}" onclick="app.state.learnTab='seed-saving'; app.renderLearn();">Seed saving basics</button>
            <button class="tab ${tab==="care" ? "active" : ""}" onclick="app.state.learnTab='care'; app.renderLearn();">Plant care basics</button>
            <button class="tab ${tab==="return" ? "active" : ""}" onclick="app.state.learnTab='return'; app.renderLearn();">How to return seeds</button>
          </div>

          ${tab==="seed-saving" ? `
            <div class="two-col" style="margin-top:16px;">
              <div class="card">
                <h3>Seed saving basics</h3>
                <ul class="list">
                  <li><i>1</i><div>Save seeds only from healthy mature plants.</div></li>
                  <li><i>2</i><div>Harvest only when pods, heads, or fruits are fully mature.</div></li>
                  <li><i>3</i><div>Dry seeds fully before storage.</div></li>
                  <li><i>4</i><div>Use labelled paper packets or envelopes.</div></li>
                  <li><i>5</i><div>Store in a cool dry dark place.</div></li>
                </ul>
              </div>
              <div class="card">
                <h3>When not to save seed</h3>
                <ul class="list">
                  <li><i>1</i><div>Do not save from weak plants with obvious disease or pest stress.</div></li>
                  <li><i>2</i><div>Do not pack seed while still damp.</div></li>
                  <li><i>3</i><div>Some plants do not grow true to type from saved seed.</div></li>
                  <li><i>4</i><div>For orchids here, focus on plant care rather than seed saving.</div></li>
                </ul>
              </div>
            </div>
          ` : ""}

          ${tab==="care" ? `
            <div class="gallery">
              <div class="gallery-item">
                <div class="gallery-visual">☀️</div>
                <div class="gallery-copy"><strong>Morning sun</strong><br>Better tolerated by many leafy greens than harsh late afternoon heat.</div>
              </div>
              <div class="gallery-item">
                <div class="gallery-visual">💧</div>
                <div class="gallery-copy"><strong>Even moisture</strong><br>Aim for consistency. Constant wetness and repeated drought swings both slow growth.</div>
              </div>
              <div class="gallery-item">
                <div class="gallery-visual">🌬️</div>
                <div class="gallery-copy"><strong>Airflow</strong><br>Important in tropical humidity. Stagnant corners invite fungal issues.</div>
              </div>
            </div>
          ` : ""}

          ${tab==="return" ? `
            <div class="two-col" style="margin-top:16px;">
              <div class="card">
                <h3>Return process</h3>
                <ul class="list">
                  <li><i>1</i><div>Dry your seeds fully before packing them for return.</div></li>
                  <li><i>2</i><div>Label clearly with seed type, date, and useful growing notes.</div></li>
                  <li><i>3</i><div>Package only clean seed without mould or obvious pests.</div></li>
                  <li><i>4</i><div>Use the return envelope at the station and place your packet into the drop box.</div></li>
                </ul>
              </div>
              <div class="card">
                <h3>Quality check logic</h3>
                <p>Returned seed should be dry, identifiable, and reasonably clean. This allows the system to circulate seed responsibly rather than accepting every return as equally usable.</p>
              </div>
            </div>
          ` : ""}
        `;
      },

      renderAccount(){
        const user = this.state.user;
        document.getElementById("page-account").innerHTML = `
          <div class="section-head">
            <div>
              <h2>My account</h2>
              <p>Set your posting name and keep your browser-side history in one place.</p>
            </div>
          </div>

          <div class="two-col" style="grid-template-columns:320px 1fr;">
            <div class="card">
              <h3>Profile</h3>
              <div style="margin-top:10px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Display name</label>
                <input type="text" id="accName" value="${esc(user.name || "")}" placeholder="Your name" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div style="margin-top:10px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Username for community posts</label>
                <input type="text" id="accUser" value="${esc(user.username || "")}" placeholder="How your posts will appear" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div style="margin-top:10px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Email</label>
                <input type="email" id="accEmail" value="${esc(user.email || "")}" placeholder="Email" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div style="margin-top:10px;">
                <label style="display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:7px;">Phone</label>
                <input type="tel" id="accPhone" value="${esc(user.phone || "")}" placeholder="Phone" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;">
              </div>
              <div class="cta-row">
                <button class="btn" onclick="app.saveAccount()">Save profile</button>
                <button class="btn ghost" onclick="app.resetAll()">Reset demo data</button>
              </div>
            </div>

            <div class="card">
              <h3>Notes</h3>
              <ul class="list">
                <li><i>1</i><div>This one-file version stores data only in the browser.</div></li>
                <li><i>2</i><div>Community posts can use actual uploaded images for new posts.</div></li>
                <li><i>3</i><div>Seed cards now open care information in a popup instead of expanding the tile height.</div></li>
                <li><i>4</i><div>The checkout QR now points to your attached PayNow image file.</div></li>
              </ul>
            </div>
          </div>
        `;
      }
    };

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        app.closeCareModal();
      }
    });

    app.init();
  </script>
</body>
</html>
